name: ci

on:
  push:
    paths:
      - "**.f"
      - "**.py"
      - ".github/workflows/ci.yml"
  pull_request:
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      FC: gfortran-14

    steps:
    - &checkout
      uses: actions/checkout@v6
    - &setup-python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - &install-pytest
      name: Python package Meson build
      run: pip install .[tests]

    - &mypy
      name: Type annotation checks
      run: mypy

    - &pytest
      name: Python package self-tests
      run: pytest

    - &cmake-workflow
      name: non-Python, standalone CMake build and test
      run: cmake --workflow default


  windows-msys:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
    - uses: msys2/setup-msys2@v2
      id: msys2
      with:
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc-fortran

    - name: Put MSYS2_MinGW64 on PATH
      shell: bash
      run: echo "${{ steps.msys2.outputs.msys2-location }}/ucrt64/bin" >> $GITHUB_PATH

    - *checkout
    - *setup-python
    - *install-pytest
    - *mypy
    - *pytest
    - *cmake-workflow
